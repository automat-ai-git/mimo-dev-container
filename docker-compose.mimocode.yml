networks:
  localai_default:
    external: true

services:
  mimocode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mimocode
    restart: unless-stopped
    stdin_open: true
    tty: true
    group_add:
      - "${DOCKER_GID:-999}"
      - "2000"
    networks:
      - localai_default
    ports:
      - "7682:8080"
    volumes:
      - ${HOME}/workspace:/workspace
      - ${HOME}/mimocode/home:/home/mimo/.mimocode
      - ${HOME}:/home/user/host_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - HOME=/home/mimo
      - MIMOCODE_HOME=/home/mimo/.mimocode
      - PASSWORD=${PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
